<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>MSU Naawan QR Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root { 
    --msu-blue: #002147; 
    --msu-gold: #FFC72C; 
    --msu-gold-hover: #e0ac1c; 
    --bg-gradient: linear-gradient(135deg, #00152e 0%, #002147 100%); 
    --glass: rgba(15, 23, 42, 0.85); 
    --glass-border: rgba(255, 199, 44, 0.3); 
    --text-main: #f8fafc; 
    --text-muted: #94a3b8; 
    --danger: #ef4444; 
    --radius: 12px; 
  }
  * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
  
  header { height: 70px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: var(--msu-blue); border-bottom: 3px solid var(--msu-gold); z-index: 10; }
  
  .app-container { display: flex; flex: 1; overflow: hidden; }
  
  .sidebar { width: 250px; background: rgba(0, 15, 30, 0.9); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; padding: 20px; gap: 8px; }
  
  .nav-btn { background: transparent; border: none; color: var(--text-muted); padding: 14px; text-align: left; border-radius: var(--radius); cursor: pointer; font-weight: 600; transition: 0.2s; }
  .nav-btn.active { background: var(--msu-gold); color: #002147; }
  
  .content { flex: 1; padding: 20px; overflow-y: auto; }
  .view-section { display: none; }
  .view-section.active { display: block; }
  
  .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
  
  input, select { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; color: white; margin-bottom: 10px; font-size: 14px; }
  select option { background: #002147; color: white; }
  
  .btn { padding: 12px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.2s; }
  .btn-primary { background: var(--msu-gold); color: #002147; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  
  #reader { width: 100%; max-width: 400px; margin: 0 auto; border: 2px solid var(--msu-gold); border-radius: 12px; overflow: hidden; background: #000; }
  
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { color: var(--msu-gold); text-align: left; padding: 10px; border-bottom: 1px solid var(--glass-border); }
  td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

  @media (max-width: 768px) {
    .app-container { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; height: auto; padding: 10px; overflow-x: auto; }
    .nav-btn { flex: 1; padding: 8px; font-size: 10px; text-align: center; white-space: nowrap; }
  }
</style>
</head>
<body>

<div id="loginOverlay" class="modal-overlay">
  <div class="card" style="width:320px; text-align:center">
    <h2 style="color:var(--msu-gold)">System Login</h2>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<header>
  <div style="display:flex; align-items:center; gap:10px">
    <img src="https://upload.wikimedia.org/wikipedia/en/2/2a/Mindanao_State_University%E2%80%93Naawan_logo.png" height="40">
    <b style="color:var(--msu-gold)">MSU NAAWAN</b>
  </div>
</header>

<div class="app-container">
  <nav class="sidebar">
    <button id="btn-dash" class="nav-btn active" onclick="nav('dashboard')">Sessions</button>
    <button id="btn-scan" class="nav-btn" onclick="nav('scanner')">Scanner</button>
    <button id="btn-gen" class="nav-btn" onclick="nav('generator')">QR Generator</button>
  </nav>

  <main class="content">
    <section id="view-dashboard" class="view-section active">
      <button class="btn btn-primary" onclick="createSession()">+ New Attendance Session</button>
      <div class="card" style="margin-top:20px; padding:0; overflow-x: auto;">
        <table><thead><tr><th>Event</th><th>Logs</th><th>Action</th></tr></thead><tbody id="sessionTableBody"></tbody></table>
      </div>
    </section>

    <section id="view-scanner" class="view-section">
      <div id="reader"></div>
      <button id="cam-trigger" class="btn btn-primary" style="margin-top:10px" onclick="initScanner()">Start Camera</button>
      
      <div class="card" style="margin-top:20px">
        <h3 id="activeTitle" style="color:var(--msu-gold); margin:0">No Session</h3>
        <div id="scanConfirm" style="display:none; margin-top:15px; border:2px solid var(--msu-gold); padding:15px; border-radius:8px; background: rgba(255,199,44,0.1)">
            <p id="scannedInfo" style="margin-top:0"></p>
            <div style="display:flex; gap:10px">
              <button class="btn btn-primary" onclick="confirmEntry()">Confirm</button>
              <button class="btn" style="color:white; border:1px solid #fff" onclick="cancelScan()">Cancel</button>
            </div>
        </div>
        <table style="margin-top:15px"><tbody id="liveLogBody"></tbody></table>
      </div>
    </section>

    <section id="view-generator" class="view-section">
      <div class="card">
        <h3 style="color:var(--msu-gold); margin-top:0">QR Registration</h3>
        <input id="g_name" placeholder="Full Name (Last, First)" oninput="liveGen()">
        <input id="g_id" placeholder="ID Number (7 Digits)" maxlength="7" oninput="this.value=this.value.replace(/[^0-9]/g,'');liveGen()">
        
        <select id="g_prog" onchange="liveGen()">
            <option value="">Select Program</option>
            <optgroup label="CBIT">
              <option value="BSBA Marketing Management">BSBA Marketing Management</option>
              <option value="BSBA Human Resource Management">BSBA Human Resource Management</option>
              <option value="BS Hospitality Management">BS Hospitality Management</option>
              <option value="BS Information Technology">BS Information Technology</option>
            </optgroup>
            <optgroup label="CELS">
              <option value="BS Forestry">BS Forestry</option>
              <option value="BS Agriculture Agronomy">BS Agriculture Agronomy</option>
              <option value="BS Agriculture Animal Science">BS Agriculture Animal Science</option>
              <option value="BS Environmental Science">BS Environmental Science</option>
              <option value="BS Nursing">BS Nursing</option>
            </optgroup>
            <optgroup label="CESS">
              <option value="Bachelor of Elementary Education">Bachelor of Elementary Education</option>
              <option value="BSEd English">BSEd English</option>
              <option value="BSEd Mathematics">BSEd Mathematics</option>
              <option value="BSEd Sciences">BSEd Sciences</option>
            </optgroup>
            <optgroup label="CFMS">
              <option value="BS Marine Sciences">BS Marine Sciences</option>
              <option value="BS Fisheries">BS Fisheries</option>
              <option value="Diploma in Fisheries Tech - Fish Processing">DFT - Fish Processing</option>
              <option value="Diploma in Fisheries Tech - Aquaculture">DFT - Aquaculture</option>
            </optgroup>
        </select>
        
        <canvas id="qrCanvas" style="display:block; margin:20px auto; background:white; padding:10px; border-radius: 8px;"></canvas>
        <button id="downloadBtn" class="btn btn-primary" onclick="downloadQR()" disabled>Download QR Code</button>
      </div>
    </section>
  </main>
</div>

<script>
const DB = 'msu_naawan_attendance_db';
let state = { sessions: [], activeId: null, scanner: null, temp: null };
const $ = id => document.getElementById(id);

function handleLogin() {
  const u = $('loginUser').value.toUpperCase();
  const p = $('loginPass').value;
  if((u === 'ADMIN' && p === 'admin123') || (u === 'CELS' && p === 'cels123') || (u === 'CFMS' && p === 'cfms123')) {
    $('loginOverlay').style.display = 'none';
    loadData();
  } else { alert('Invalid Credentials'); }
}

function loadData() {
  const data = JSON.parse(localStorage.getItem(DB) || '{"sessions":[]}');
  state.sessions = data.sessions;
  renderDash();
}

function nav(v) {
  document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  $(`view-${v}`).classList.add('active');
  $(`btn-${v==='dashboard'?'dash':v==='scanner'?'scan':'gen'}`).classList.add('active');
  if(v !== 'scanner') stopScanner();
}

function createSession() {
  let name = window.prompt("Event Name:");
  if(!name) return;
  const s = { id: Date.now(), name, logs: [] };
  state.sessions.unshift(s);
  state.activeId = s.id;
  localStorage.setItem(DB, JSON.stringify({sessions: state.sessions}));
  renderDash();
  nav('scanner');
}

function renderDash() {
  $('sessionTableBody').innerHTML = state.sessions.map(s => `
    <tr>
      <td><b>${s.name}</b></td>
      <td>${s.logs.length}</td>
      <td><button class="btn-primary" style="padding:5px 10px; width:auto; font-size:11px" onclick="openS(${s.id})">Open</button></td>
    </tr>`).join('');
}

function openS(id) { state.activeId = id; nav('scanner'); }

async function initScanner() {
  const s = state.sessions.find(x => x.id == state.activeId);
  if(!s) return alert("Select or start a session first.");
  $('activeTitle').textContent = s.name;
  if(state.scanner) await stopScanner();
  state.scanner = new Html5Qrcode("reader");
  state.scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScan)
  .then(() => { $('cam-trigger').style.display = 'none'; })
  .catch(() => alert("Camera blocked. Please allow permissions in settings."));
}

async function stopScanner() {
  if(state.scanner) {
    try { await state.scanner.stop(); } catch(e) {}
    state.scanner = null;
    $('cam-trigger').style.display = 'block';
  }
}

function onScan(text) {
  state.scanner.pause();
  try {
    const data = JSON.parse(text);
    state.temp = data;
    $('scannedInfo').innerHTML = `<strong>${data.name}</strong><br>${data.id}<br>${data.prog}`;
    $('scanConfirm').style.display = 'block';
  } catch(e) {
    alert("Invalid MSU QR Code");
    state.scanner.resume();
  }
}

function confirmEntry() {
  const s = state.sessions.find(x => x.id == state.activeId);
  const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  s.logs.unshift({ ...state.temp, time: timeStr });
  localStorage.setItem(DB, JSON.stringify({sessions: state.sessions}));
  renderLogs();
  cancelScan();
}

function cancelScan() { $('scanConfirm').style.display = 'none'; if(state.scanner) state.scanner.resume(); }

function renderLogs() {
  const s = state.sessions.find(x => x.id == state.activeId);
  if(!s) return;
  $('liveLogBody').innerHTML = s.logs.map(l => `<tr><td><b>${l.name}</b><br><small>${l.prog}</small></td><td style="text-align:right">${l.time}</td></tr>`).join('');
}

function liveGen() {
  const name = $('g_name').value;
  const id = $('g_id').value;
  const prog = $('g_prog').value;
  if(name && id.length === 7 && prog) {
    QRCode.toCanvas($('qrCanvas'), JSON.stringify({ name, id, prog }), { width: 200, margin: 2, color: { dark: '#002147' } });
    $('downloadBtn').disabled = false;
  } else {
    $('downloadBtn').disabled = true;
  }
}

function downloadQR() {
  const name = $('g_name').value.replace(/\s/g, '_');
  const link = document.createElement('a');
  link.download = `QR_${name}.png`;
  link.href = $('qrCanvas').toDataURL();
  link.click();
}
</script>
</body>
</html>
